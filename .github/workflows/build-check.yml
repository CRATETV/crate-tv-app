name: Build Check

# Runs on every push and pull request, to every branch. The goal is simple:
# catch a broken build automatically, before it's noticed by a viewer instead
# of a green/red checkmark on GitHub. This mirrors exactly what `npm run
# lint` and `npm run build` do locally — it just runs them for you on every
# push so nothing has to be remembered or run by hand.
on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npm run lint

      - name: Production build
        run: npm run build
