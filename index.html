    <style>
      body {
        font-family: 'Roboto', sans-serif;
        background-color: #141414;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .animate-heartbeat {
        animation: heartbeat 0.5s ease-in-out;
      }
      @keyframes heartbeat {
        0% { transform: scale(1); }
        25% { transform: scale(1.3); }
        50% { transform: scale(1); }
        75% { transform: scale(1.2); }
        100% { transform: scale(1); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fadeInHeroContent {
        animation: fadeInHeroContent 0.7s ease-in-out;
      }
      @keyframes fadeInHeroContent {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0px); }
      }

      /* Styles for Submission Form */
      .container {
            max-width: 800px;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            background-color: #222222;
            border: 1px solid #4a4a6e;
            color: #e0e0e0;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #6a6ad9;
            box-shadow: 0 0 0 3px rgba(106, 106, 217, 0.5);
        }
        .submit-btn {
            background-color: #6a6ad9;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 500;
            transition: background-color 0.3s ease, transform 0.2s ease;
            cursor: pointer;
            border: none;
        }
        .submit-btn:hover {
            background-color: #5353c9;
            transform: translateY(-2px);
        }
        .file-dropzone {
            border: 2px dashed #4a4a6e;
            background-color: #222222;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .file-dropzone.drag-over {
            background-color: #444444;
            border-color: #6a6ad9;
        }
        .file-list {
            margin-top: 16px;
        }
        .file-list p {
            background-color: #333333;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .file-list p .remove-file {
            cursor: pointer;
            color: #e0e0e0;
            margin-left: 8px;
            font-weight: bold;
        }
    </style>
