    <title>Crate TV</title>
    <link rel="icon" type="image/x-icon" href="https://cratetelevision.s3.amazonaws.com/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="https://cratetelevision.s3.amazonaws.com/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://cratetelevision.s3.amazonaws.com/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://cratetelevision.s3.amazonaws.com/favicon-16x16.png">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: 'Roboto', sans-serif;
        background-color: #141414;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      .animate-heartbeat {
        animation: heartbeat 0.5s ease-in-out;
      }
      @keyframes heartbeat {
        0% { transform: scale(1); }
        25% { transform: scale(1.3); }
        50% { transform: scale(1); }
        75% { transform: scale(1.2); }
        100% { transform: scale(1); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fadeInHeroContent {
        animation: fadeInHeroContent 0.7s ease-in-out;
      }
      @keyframes fadeInHeroContent {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0px); }
      }
    </style>
