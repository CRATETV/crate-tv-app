    <!-- Tailwind CSS is now processed by Vite build — no CDN needed -->
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sar: env(safe-area-inset-right);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #050505;
        margin: 0;
        color: white;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
        padding-top: var(--sat);
        padding-bottom: var(--sab);
        padding-left: var(--sal);
        padding-right: var(--sar);
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }
      .form-input {
        width: 100%;
        padding: 1rem;
        background-color: rgba(255, 255, 255, 0.03) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 9999px; /* Pill input */
        color: #ffffff !important;
        font-size: 0.95rem;
        font-weight: 500;
        transition: all 0.2s ease;
        padding-left: 1.5rem;
      }
      .form-input:focus {
        border-color: #ef4444 !important;
        background-color: rgba(255, 255, 255, 0.05) !important;
        outline: none;
      }
      .form-label {
        display: block;
        font-size: 10px;
        font-weight: 900;
        color: #9ca3af;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.35em;
        margin-left: 1rem;
      }
      .submit-btn {
        background-color: #ef4444;
        color: white;
        font-weight: 900;
        padding: 1.25rem 2.5rem;
        border-radius: 9999px; /* Pill button */
        text-transform: uppercase;
        letter-spacing: 0.15em;
        text-align: center;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.4);
      }
      ::-webkit-scrollbar { display: none; }
      * { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* SEASONAL ANIMATIONS */
      @keyframes heart-beat {
        0% { transform: scale(1) translateY(0) rotate(-5deg); opacity: 0.6; }
        50% { transform: scale(1.4) translateY(-15px) rotate(5deg); opacity: 1; }
        100% { transform: scale(1) translateY(0) rotate(-5deg); opacity: 0.6; }
      }
      .animate-heart-beat {
        animation: heart-beat 3s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      }

      @keyframes tree-sway {
        0% { transform: rotate(-8deg) scale(1) translateY(0); }
        50% { transform: rotate(8deg) scale(1.1) translateY(-5px); }
        100% { transform: rotate(-8deg) scale(1) translateY(0); }
      }
      .animate-tree-sway {
        animation: tree-sway 4.5s ease-in-out infinite;
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0.4; }
        50% { opacity: 1; filter: brightness(1.8) drop-shadow(0 0 12px white); }
      }
      .animate-twinkle {
        animation: twinkle 2s ease-in-out infinite;
      }

      /* WATCH PARTY ANIMATIONS */
      @keyframes slideInRight {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes slideInDown {
        from { transform: translateY(-100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      @keyframes emoji-float {
        0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 0; }
        10% { opacity: 1; transform: translateY(-20px) scale(1.2) rotate(10deg); }
        100% { transform: translateY(-400px) scale(0.8) rotate(-20deg); opacity: 0; }
      }
      .animate-emoji-float {
        animation: emoji-float 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      .crate-emoji {
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
      }

      /* FLUID TYPOGRAPHY SECTOR */
      .text-fluid-hero {
        font-size: clamp(3.5rem, 18vw, 10rem);
      }
      .text-fluid-zine {
        font-size: clamp(3rem, 15vw, 8rem);
      }
      .text-fluid-sub {
        font-size: clamp(1.25rem, 4vw, 2.5rem);
      }

      /* PRINTER MODEL SECTOR */
      @media print {
        body {
          background: white !important;
          color: black !important;
          padding: 0 !important;
        }
        #root {
          background: white !important;
        }
        .no-print {
          display: none !important;
        }
        .print-only {
          display: block !important;
        }
        .bg-[#050505], .bg-[#0f0f0f], .bg-black/40, .bg-white\/\[0\.02\], .bg-white\/\[0\.03\] {
          background: white !important;
          color: black !important;
        }
        .border-white\/5, .border-white\/10 {
          border-color: #eee !important;
        }
        .text-white, .text-gray-400, .text-gray-500, .text-gray-600, .text-gray-700 {
          color: black !important;
        }
        .text-red-600, .text-red-500 {
          color: #ef4444 !important;
        }
        /* Ensure charts and tables are visible */
        canvas, svg {
          max-width: 100% !important;
          height: auto !important;
        }
        .overflow-x-auto {
          overflow: visible !important;
        }
        /* Specific fixes for Audit Log and Reports */
        .audit-row {
          border-bottom: 1px solid #ddd !important;
          page-break-inside: avoid;
        }
        .fixed {
          position: relative !important;
        }
        .backdrop-blur-xl {
          backdrop-filter: none !important;
        }
      }

      /* ── CINEMATIC CORE ANIMATIONS ───────────────────────────────────────── */
      
      /* Landing page poster grid slow pan */
      @keyframes slow-pan {
        0%   { transform: scale(1.1) rotate(-5deg) translateY(0); }
        50%  { transform: scale(1.15) rotate(-5deg) translateY(-2%); }
        100% { transform: scale(1.1) rotate(-5deg) translateY(0); }
      }
      .animate-slow-pan {
        animation: slow-pan 30s ease-in-out infinite;
      }

      /* Hero image ken burns zoom */
      @keyframes ken-burns {
        0%   { transform: scale(1.05); }
        100% { transform: scale(1.15); }
      }
      .animate-ken-burns {
        animation: ken-burns 8s ease-in-out infinite alternate;
      }

      /* Hero gradient overlay — cinematic dark vignette */
      .hero-gradient-overlay {
        background: linear-gradient(
          to bottom,
          rgba(5,5,5,0.2) 0%,
          transparent 25%,
          transparent 50%,
          rgba(5,5,5,0.6) 75%,
          rgba(5,5,5,1) 100%
        );
      }

      /* Like button heartbeat */
      @keyframes heartbeat {
        0%   { transform: scale(1); }
        25%  { transform: scale(1.4); }
        50%  { transform: scale(1); }
        75%  { transform: scale(1.2); }
        100% { transform: scale(1); }
      }
      .animate-heartbeat {
        animation: heartbeat 0.5s ease-in-out;
      }

      /* Hide scrollbars everywhere */
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

      /* Core app animations */
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes fadeInHeroContent {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.95); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes floatUp {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20%       { transform: translateX(-6px); }
        40%       { transform: translateX(6px); }
        60%       { transform: translateX(-4px); }
        80%       { transform: translateX(4px); }
      }
      @keyframes ticketEntry {
        from { opacity: 0; transform: translateY(30px) scale(0.95); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }

    </style>
